<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#000000" />
  <title>离线 - 永不失联</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font: 16px/1.6 system-ui, -apple-system, sans-serif;
      background: #fff;
      color: #000;
      text-align: center;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .h1 {
      background: #000;
      padding: 12px 20px;
      color: #fff;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 2px;
      margin-bottom: 16px;
    }
    .icon { font-size: 48px; margin-bottom: 16px; }
    h1 { font-size: 18px; font-weight: 700; color: #111; margin-bottom: 8px; }
    p { font-size: 14px; color: #666; line-height: 1.6; max-width: 320px; margin-bottom: 24px; }
    .warn {
      background: #fff3cd;
      color: #856404;
      padding: 8px 12px;
      border-radius: 4px;
      font-size: 13px;
      margin-bottom: 16px;
      max-width: 320px;
    }
    .btn {
      display: inline-block;
      padding: 10px 24px;
      background: #f90;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
    }
    .btn:hover { background: #e68000; }
    .btn:active { background: #cc7000; }
    .bt {
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px solid #eee;
      font-size: 13px;
      color: #333;
      max-width: 320px;
    }
    .bt p { margin-bottom: 4px; font-size: 13px; }
  </style>
</head>
<body>
  <div class="h1">永不失联</div>
  <div class="icon">📡</div>
  <h1>网络连接已断开</h1>
  <div class="warn">⚠️ 当前处于离线状态，已缓存的页面仍可正常访问</div>
  <p>域名可能被封，请检查网络连接后重试。您也可以尝试下方备用域名。</p>
  <button class="btn" onclick="location.reload()">重新连接</button>
  <div class="bt">
    <p>多收藏不同网址 📌 推荐电信联通访问</p>
    <p>移动网 / 国产浏览器会拦截网址</p>
    <p>推荐截图 📷 保存本页不迷路</p>
  </div>
</body>
</html>
