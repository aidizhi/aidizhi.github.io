<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#000000" />
  <title>离线 - 永不失联</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #fff;
      color: #333;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      text-align: center;
    }
    .icon { font-size: 64px; margin-bottom: 16px; }
    h1 { font-size: 20px; font-weight: 700; color: #111; margin-bottom: 8px; }
    p { font-size: 14px; color: #666; line-height: 1.6; max-width: 320px; margin-bottom: 24px; }
    .btn {
      display: inline-block;
      padding: 10px 24px;
      background: #f90;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s;
    }
    .btn:hover { background: #e68000; }
    .btn:active { background: #cc7000; }
  </style>
</head>
<body>
  <div class="icon">📡</div>
  <h1>网络连接已断开</h1>
  <p>当前处于离线状态，请检查网络连接后重试。已缓存的页面仍可正常访问。</p>
  <button class="btn" onclick="location.reload()">重新连接</button>
</body>
</html>
