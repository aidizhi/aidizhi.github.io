<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="robots" content="noindex,nofollow,noarchive,nosnippet,noimageindex">
<meta name="referrer" content="no-referrer">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; connect-src 'none'; base-uri 'none'; form-action 'none'; frame-ancestors 'none';">
<title>正在进入</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}body{min-height:100vh;background:#050505;color:#fff;display:flex;align-items:center;justify-content:center;padding:22px;font:16px/1.65 system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}.box{width:min(460px,100%);text-align:center;background:linear-gradient(180deg,#171717,#0d0d0d);border:1px solid #2b2b2b;border-radius:22px;padding:22px;box-shadow:0 18px 55px rgba(0,0,0,.45)}h1{font-size:20px;margin-bottom:8px}.s{color:#999;font-size:13px;margin-top:8px}.guide{display:none;text-align:left}.guide h1{text-align:center}.guide p{color:#cfcfcf;font-size:14px;margin:8px 0}.steps{margin:16px 0;display:grid;gap:10px}.step{background:#111;border:1px solid #282828;border-radius:14px;padding:12px;font-size:14px}.step b{color:#ffb020}.btns{display:grid;gap:10px;margin-top:14px}.btn{border:0;border-radius:14px;padding:13px 14px;font-weight:800;color:#fff;background:#f59e0b;text-decoration:none;text-align:center;font-size:14px}.btn.secondary{background:#1f2937}.btn.green{background:#16a34a}.small{text-align:center;color:#777;font-size:12px;margin-top:12px}
</style>
</head>
<body>
<div id="loading" class="box"><h1>正在选择可用线路</h1><div class="s">请稍候...</div></div>
<div id="guide" class="box guide">
  <h1 id="guideTitle">请使用系统浏览器打开</h1>
  <p id="guideDesc">当前 App 内置浏览器可能限制播放或拦截跳转，建议复制链接到 Chrome 或 Edge 打开。</p>
  <div class="steps">
    <div class="step"><b>1.</b> 点击下方复制可用地址</div>
    <div class="step"><b>2.</b> 打开 Chrome / Edge / Safari 粘贴访问</div>
    <div class="step"><b>3.</b> 进入网站后可选择“添加到主屏幕”，像 PWA 一样使用</div>
  </div>
  <div class="btns">
    <button id="copyBtn" class="btn">复制可用地址</button>
    <a id="chromeBtn" class="btn green" href="#" rel="nofollow">尝试用 Chrome 打开</a>
    <a id="edgeBtn" class="btn secondary" href="#" rel="nofollow">尝试用 Edge 打开</a>
    <a id="continueBtn" class="btn secondary" href="#" rel="nofollow">仍然继续访问</a>
  </div>
  <div class="small">如果按钮无效，请手动打开浏览器后粘贴地址。</div>
</div>
<script>
(function(){
  var ua=navigator.userAgent||'';
  if(/bot|spider|crawl|slurp|bingpreview|facebookexternalhit|twitterbot|telegrambot|whatsapp|preview|headless|curl|wget|python|scrapy|httpclient/i.test(ua)){
    document.body.innerHTML='<div class="box"><h1>页面不存在</h1></div>';
    return;
  }
  var targets=[
    'https://www.4545.eu.org/','https://www.455333.xyz/','https://www.466333.xyz/',
    'https://www.4666.eu.org/','https://www.477333.xyz/','https://www.488333.xyz/',
    'https://www.6767.eu.org/','https://www.994555.xyz/','https://www.bizi.eu.org/',
    'https://www.buqu.eu.org/','https://www.daba.eu.org/','https://www.nixi.eu.org/',
    'https://www.qima.eu.org/'
  ];
  var hasCrypto=window.crypto&&window.crypto.getRandomValues;
  var n=hasCrypto?window.crypto.getRandomValues(new Uint32Array(1))[0]:Math.floor(Math.random()*4294967296);
  var target=targets[(n+9)%targets.length];
  var isInApp=/micromessenger|wechat|\bqq\/(?!.*qqbrowser)|douyin|aweme|tiktok|kwai|kuaishou|snssdk|bytedance|weibo|alipayclient|dingtalk|baiduboxapp/i.test(ua);
  if(!isInApp){location.replace(target);return;}
  var app='App';
  if(/micromessenger|wechat/i.test(ua))app='微信';
  else if(/\bqq\//i.test(ua)&&!/qqbrowser/i.test(ua))app='QQ';
  else if(/douyin|aweme|tiktok|snssdk|bytedance/i.test(ua))app='抖音';
  else if(/kwai|kuaishou/i.test(ua))app='快手';
  else if(/weibo/i.test(ua))app='微博';
  else if(/alipayclient/i.test(ua))app='支付宝';
  document.getElementById('loading').style.display='none';
  document.getElementById('guide').style.display='block';
  document.getElementById('guideTitle').textContent='请不要在 '+app+' 内直接打开';
  document.getElementById('guideDesc').textContent=app+' 内置浏览器可能限制播放或拦截跳转，建议复制地址到 Chrome / Edge / Safari 打开。';
  var copyBtn=document.getElementById('copyBtn');
  copyBtn.onclick=function(){
    function ok(){copyBtn.textContent='已复制，去浏览器粘贴打开';copyBtn.style.background='#16a34a'}
    if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(target).then(ok).catch(fallback)}else fallback();
    function fallback(){var i=document.createElement('input');i.value=target;document.body.appendChild(i);i.select();document.execCommand('copy');document.body.removeChild(i);ok()}
  };
  document.getElementById('continueBtn').href=target;
  document.getElementById('chromeBtn').href='googlechrome://navigate?url='+encodeURIComponent(target);
  document.getElementById('edgeBtn').href='microsoft-edge:'+target;
})();
</script>
</body>
</html>
