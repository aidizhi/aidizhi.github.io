<!doctype html><html lang=zh-CN><head><meta charset=utf-8><meta name=viewport content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name=robots content=noindex,nofollow,noarchive><meta name=theme-color content=#0f172a><meta name=apple-mobile-web-app-capable content=yes><meta name=apple-mobile-web-app-status-bar-style content=black-translucent><title>安装到桌面</title><link rel=manifest href=/manifest.json><link rel=apple-touch-icon href=/apple-touch-icon.png><style>*{box-sizing:border-box;margin:0;padding:0}body{min-height:100svh;display:flex;align-items:center;justify-content:center;padding:18px;background:linear-gradient(160deg,#160824,#25104a,#0f172a);color:#fff;font:15px/1.7 system-ui,-apple-system,sans-serif}.w{width:min(430px,100%)}.c{background:rgba(255,255,255,.94);color:#111827;border-radius:24px;padding:18px;box-shadow:0 24px 55px #0006}h1{font-size:28px;margin-bottom:8px}.p{color:#64748b;font-size:13px;margin-bottom:14px}.b{width:100%;border:0;border-radius:16px;padding:13px 14px;background:#7c3aed;color:#fff;font:inherit;font-weight:800}.a{display:block;text-align:center;color:#cbd5e1;text-decoration:none;font-size:13px;margin-top:14px}.s{display:grid;gap:8px;margin-top:14px}.s div{background:#f8fafc;border:1px solid #eef2ff;border-radius:14px;padding:10px;color:#64748b;font-size:13px}@media(prefers-color-scheme:dark){.c{background:rgba(15,23,42,.9);color:#f8fafc}.s div{background:#111827;border-color:#334155;color:#cbd5e1}}</style></head><body><main class=w><section class=c><h1>安装到桌面</h1><p class=p>安装后可像 App 一样从桌面打开，离线也能看到入口页。</p><button class=b id=i>准备安装</button><div class=s><div>安卓 Chrome / Edge：点击上方按钮或浏览器菜单里的“添加到主屏幕”。</div><div>iPhone Safari：点分享按钮，再选择“添加到主屏幕”。</div></div></section><a class=a href=/>返回首页</a></main><script>let p,b=document.getElementById('i');navigator.serviceWorker&&navigator.serviceWorker.register('/sw.js').then(()=>b.textContent='点击安装或添加到主屏幕');addEventListener('beforeinstallprompt',e=>{e.preventDefault();p=e;b.textContent
