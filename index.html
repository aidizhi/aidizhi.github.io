/* ===== CSS 变量与主题 ===== */
:root {
  --bg: #fff;
  --fg: #000;
  --accent: #f90;
  --accent-hover: #e68000;
  --muted: #666;
  --border: #eee;
  --shadow: rgba(0,0,0,.15);
  --radius: 12px;
  --transition: .25s cubic-bezier(.4,0,.2,1);
}

@media (prefers-color-scheme: dark) {

    --fg: #f0f0f0;

}

/* ===== 基础重置 ===== */
*,*::before,*::after { margin:0; padding:0; box-sizing:border-box }
html { -webkit-text-size-adjust:100%; scroll-behavior:smooth }
body {
  font: 16px/1.6 system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background: var(--bg);
  color: var(--fg);
  text-align: center;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  transition: background var(--transition), color var(--transition);
}

/* ===== 头部 ===== */
.h1 {
  background: var(--fg);
  color: var(--bg);
  padding: 14px 20px;
  font-size: 22px;
  font-weight: 700;
  letter-spacing: 3px;
  position: relative;
  overflow: hidden;
}
.h1::after {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,153,0,.15), transparent);
  animation: shimmer 3s infinite;
}
@keyframes shimmer {
  0% { transform: translateX(-100%) }
  100% { transform: translateX(100%) }
}

.h2 {
  background: var(--accent);
  color: #fff;
  padding: 10px 20px;
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 2px;
  position: relative;
}

/* ===== 内容区 ===== */
.c {
  padding: 24px 20px;
  max-width: 600px;
  margin: 0 auto;
}

.tip {
  font-size: 14px;
  color: var(--fg);
  margin-bottom: 6px;
  opacity: .9;
}
.tip-s {
  font-size: 12px;
  color: var(--muted);
  margin-bottom: 20px;
}

/* 链接卡片 */
.link-card {
  display: block;
  margin: 8px auto;
  padding: 14px 20px;
  background: var(--bg);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  color: var(--accent);
  text-decoration: none;
  font-size: 15px;
  font-weight: 600;
  letter-spacing: .5px;
  transition: all var(--transition);
  position: relative;
  overflow: hidden;
}
.link-card:hover {
  border-color: var(--accent);
  transform: translateY(-2px);
  box-shadow: 0 6px 20px var(--shadow);
}
.link-card:active {
  transform: translateY(0);
}
.link-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: var(--accent);
  opacity: 0;
  transition: opacity var(--transition);
}
.link-card:hover::before { opacity: 1 }

/* ===== 底部 ===== */
.bt {
  margin-top: 32px;
  padding-top: 24px;
  border-top: 1px solid var(--border);
  font-size: 13px;
  color: var(--muted);
}
.bt p { margin-bottom: 6px }

/* ===== 网络状态指示器 ===== */
.net-status {

  left: 0;
  right: 0;
  z-index: 10000;
  padding: 8px;
  font-size: 12px;

  text-align: center;

}
.net-status.offline {

  color: #fff;
  transform: translateY(0);
}
.net-status.online {
  background: #28a745;

}

/* ===== 更新提示 ===== */
.update-toast {

  left: 50%;

/* 减少动画偏好 */

<script>
// ============================================================
// S 级 PWA 核心逻辑
// ============================================================

// ---------- 1. Service Worker 注册 ----------
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js', { scope: '/' })
      .then((reg) => {
        console.log('[PWA] SW 注册成功:', reg.scope);

        // 监听更新
        reg.addEventListener('updatefound', () => {
          const newWorker = reg.installing;
          newWorker.addEventListener('statechange', () => {
            if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
              showUpdateToast(newWorker);
            }
          });
        });
      })
      .catch((err) => console.error('[PWA] SW 注册失败:', err));

    // 监听来自 SW 的消息
    navigator.serviceWorker.addEventListener('message', (event) => {
      if (event.data && event.data.type === 'SW_UPDATED') {
        window.location.reload();
      }
    });
  });
}

// ---------- 3. 网络状态监测 ----------
const netStatus = document.getElementById('netStatus');

function updateNetworkStatus() {
  if (!navigator.onLine) {
    netStatus.textContent = '&#128308; 网络已断开，已切换离线模式';
    netStatus.className = 'net-status offline';
    setTimeout(() => { netStatus.style.transform = 'translateY(-100%)'; }, 3000);
  } else {
    netStatus.textContent = '&#128994; 网络已恢复';
    netStatus.className = 'net-status online';
    setTimeout(() => { netStatus.style.transform = 'translateY(-100%)'; }, 2000);
    setTimeout(() => { netStatus.style.transform = ''; }, 2500);
  }
}

window.addEventListener('online', updateNetworkStatus);
window.addEventListener('offline', updateNetworkStatus);

// ---------- 4. 更新提示 ----------
const updateToast = document.getElementById('updateToast');
const updateBtn = document.getElementById('updateBtn');
let waitingWorker = null;

function showUpdateToast(worker) {
  waitingWorker = worker;
  updateToast.classList.add('show');
}

updateBtn.addEventListener('click', () => {
  if (waitingWorker) {
    waitingWorker.postMessage('skipWaiting');
    updateToast.classList.remove('show');
  }
});

// ---------- 5. 后台同步注册 ----------
async function registerBackgroundSync() {
  if ('serviceWorker' in navigator && 'SyncManager' in window) {
    try {
      const reg = await navigator.serviceWorker.ready;
      await reg.sync.register('sync-logs');
      console.log('[PWA] 后台同步已注册');
    } catch (err) {
      console.error('[PWA] 后台同步注册失败:', err);
    }
  }
}
registerBackgroundSync();

// ---------- 6. 定期同步注册 ----------
async function registerPeriodicSync() {
  if ('serviceWorker' in navigator && 'PeriodicSyncManager' in window) {
    try {
      const reg = await navigator.serviceWorker.ready;
      await reg.periodicSync.register('cleanup-cache', { minInterval: 24 * 60 * 60 * 1000 });
      console.log('[PWA] 定期同步已注册');
    } catch (err) {
      console.error('[PWA] 定期同步注册失败:', err);
    }
  }
}
registerPeriodicSync();

// ---------- 7. 推送通知订阅 ----------
async function subscribePush() {
  if (!('PushManager' in window)) return;
  try {
    const reg = await navigator.serviceWorker.ready;
    const sub = await reg.pushManager.subscribe({
      userVisibleOnly: true,
      applicationServerKey: urlBase64ToUint8Array(
        'BEl62iSMfVjLm4U3e3K8RnPDpK5e9x8VfQy_oP0XUe0'
      )
    });
    console.log('[PWA] 推送订阅成功:', sub.endpoint);
  } catch (err) {
    console.error('[PWA] 推送订阅失败:', err);
  }
}

function urlBase64ToUint8Array(base64String) {
  const padding = '='.repeat((4 - base64String.length % 4) % 4);
  const base64 = (base64String + padding).replace(/\-/g, '+').replace(/_/g, '/');
  const rawData = window.atob(base64);
  return Uint8Array.from([...rawData].map((char) => char.charCodeAt(0)));
}

// ---------- 8. 页面可见性 API - 节省资源 ----------
document.addEventListener('visibilitychange', () => {
  if (document.hidden) {
    console.log('[PWA] 页面隐藏，暂停非必要任务');
  } else {
    console.log('[PWA] 页面显示，恢复任务');
  }
});

// ---------- 9. 性能监控 ----------
if ('performance' in window) {
  window.addEventListener('load', () => {
    setTimeout(() => {
      const perf = performance.getEntriesByType('navigation')[0];
      if (perf) {
        console.log(`[PWA] 页面加载时间: ${Math.round(perf.loadEventEnd - perf.startTime)}ms`);
      }
    }, 0);
  });
}

console.log('[PWA] S 级 PWA 初始化完成');
</script>
