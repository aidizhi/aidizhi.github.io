<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="robots" content="noindex,nofollow,noarchive,nosnippet,noimageindex">
<meta name="referrer" content="no-referrer">
<meta name="format-detection" content="telephone=no,email=no,address=no">
<meta name="theme-color" content="#ffffff">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'none'; base-uri 'none'; form-action 'none'; frame-ancestors 'none';">
<title>永不失联 · 地址入口</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{min-height:100vh;background:#f7f7f5;color:#111;font:15px/1.65 system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;display:flex;align-items:center;justify-content:center;padding:24px}
.wrap{width:min(420px,100%)}
.top{margin-bottom:28px}
.logo{font-size:24px;font-weight:800;letter-spacing:.08em}
.sub{color:#777;font-size:13px;margin-top:4px}
.box{background:#fff;border:1px solid #e8e8e5;border-radius:18px;padding:18px}
.tip{font-size:13px;color:#666;margin:14px 0 12px}
.mail{display:block;text-decoration:none;color:#111;background:#fafafa;border:1px solid #ededed;border-radius:14px;padding:14px 15px;margin-bottom:4px;font-size:17px;font-weight:800}
.mail small{display:block;color:#777;font-size:12px;font-weight:400;margin-top:2px}
.grid{display:grid;gap:8px}
.link{display:flex;align-items:center;justify-content:space-between;text-decoration:none;color:#111;background:#fff;border:1px solid #ededed;border-radius:14px;padding:13px 14px;font-weight:650;transition:.18s ease}
.link span{color:#999;font-size:12px;font-weight:500}
.link:active{transform:scale(.99);background:#f6f6f4}
.foot{color:#888;font-size:12px;margin-top:16px;line-height:1.7}
@media (hover:hover){.link:hover,.mail:hover{border-color:#cfcfc9;background:#fbfbfa}}
@media (prefers-color-scheme:dark){body{background:#0f0f0f;color:#f1f1f1}.box{background:#171717;border-color:#292929}.sub,.tip,.foot,.mail small,.link span{color:#9a9a9a}.mail,.link{background:#1b1b1b;color:#f1f1f1;border-color:#2d2d2d}.link:active{background:#222}}
</style>
</head>
<body>
<main class="wrap">
  <div class="top">
    <div class="logo">永不失联</div>
    <p class="sub">收藏本页，防止迷路</p>
  </div>
  <section class="box">
    <a class="mail" href="mailto:4@455555.XYZ" rel="nofollow">4@455555.XYZ<small>发邮件 30 秒内自动回复最新地址</small></a>
    <p class="tip">选择任一入口进入</p>
    <div class="grid">
      <a class="link" href="/r1.html" rel="nofollow">www.455333.xyz <span>进入</span></a>
      <a class="link" href="/r2.html" rel="nofollow">www.466333.xyz <span>进入</span></a>
      <a class="link" href="/r3.html" rel="nofollow">www.477333.xyz <span>进入</span></a>
      <a class="link" href="/r4.html" rel="nofollow">www.488333.xyz <span>进入</span></a>
    </div>
    <div class="foot">如无法打开，请复制到 Chrome / Edge / Safari 访问。</div>
  </section>
</main>
</body>
</html>
