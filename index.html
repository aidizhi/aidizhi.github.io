<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="robots" content="noindex,nofollow,noarchive,nosnippet,noimageindex">
<meta name="referrer" content="no-referrer">
<meta name="format-detection" content="telephone=no,email=no,address=no">
<meta name="theme-color" content="#ec4899">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'none'; base-uri 'none'; form-action 'none'; frame-ancestors 'none';">
<title>永不失联 · 地址入口</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{min-height:100vh;background:#f9fafb;color:#1f2937;font:15px/1.65 system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;display:flex;align-items:center;justify-content:center;padding:18px}
.wrap{width:min(430px,100%)}
.top{text-align:center;margin-bottom:18px}
.brand{display:inline-flex;align-items:center;justify-content:center;width:54px;height:54px;border-radius:18px;background:linear-gradient(135deg,#ec4899,#be185d);color:#fff;font-size:24px;font-weight:900;box-shadow:0 10px 24px rgba(190,24,93,.18);margin-bottom:10px}
.logo{font-size:22px;font-weight:800;letter-spacing:.06em;color:#1f2937}
.sub{color:#6b7280;font-size:13px;margin-top:3px}
.box{background:rgba(255,255,255,.96);border:1px solid #f3f4f6;border-radius:22px;padding:16px;box-shadow:0 12px 32px rgba(15,23,42,.06)}
.tip{font-size:13px;color:#6b7280;margin:14px 2px 10px}
.mail{display:block;text-decoration:none;color:#be185d;background:#fdf2f8;border:1px solid #fce7f3;border-radius:16px;padding:13px 14px;margin-bottom:4px;font-size:17px;font-weight:800}
.mail small{display:block;color:#9d174d;font-size:12px;font-weight:500;margin-top:2px;opacity:.78}
.grid{display:grid;gap:9px}
.link{display:flex;align-items:center;justify-content:space-between;text-decoration:none;color:#374151;background:#fff;border:1px solid #f3f4f6;border-radius:16px;padding:13px 14px;font-weight:650;transition:.18s ease;min-height:46px}
.link span{color:#be185d;background:#fdf2f8;border-radius:999px;padding:2px 8px;font-size:12px;font-weight:600}
.link:active{transform:scale(.99);background:#fdf2f8}
.foot{color:#6b7280;font-size:12px;margin-top:14px;line-height:1.7;text-align:center}
@media (hover:hover){.link:hover,.mail:hover{border-color:#f9a8d4;box-shadow:0 8px 20px rgba(190,24,93,.08)}}
@media (prefers-color-scheme:dark){body{background:#111827;color:#f9fafb}.logo{color:#f9fafb}.box{background:rgba(31,41,55,.92);border-color:#374151}.sub,.tip,.foot{color:#9ca3af}.link{background:#111827;color:#f3f4f6;border-color:#374151}.mail{background:#3b1228;border-color:#831843;color:#f9a8d4}.mail small{color:#f9a8d4}.link:active{background:#1f2937}}
</style>
</head>
<body>
<main class="wrap">
  <div class="top">
    <div class="brand">永</div>
    <div class="logo">永不失联</div>
    <p class="sub">收藏本页，防止迷路</p>
  </div>
  <section class="box">
    <a class="mail" href="mailto:4@455555.XYZ" rel="nofollow">4@455555.XYZ<small>发邮件 30 秒内自动回复最新地址</small></a>
    <p class="tip">选择任一入口进入</p>
    <div class="grid">
      <a class="link" href="/r1.html" rel="nofollow">www.455333.xyz <span>进入</span></a>
      <a class="link" href="/r2.html" rel="nofollow">www.466333.xyz <span>进入</span></a>
      <a class="link" href="/r3.html" rel="nofollow">www.477333.xyz <span>进入</span></a>
      <a class="link" href="/r4.html" rel="nofollow">www.488333.xyz <span>进入</span></a>
    </div>
    <div class="foot">如无法打开，请复制到 Chrome / Edge / Safari 访问。</div>
  </section>
</main>
</body>
</html>
