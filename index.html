<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="robots" content="noindex,nofollow,noarchive,nosnippet,noimageindex">
<meta name="referrer" content="no-referrer">
<meta name="format-detection" content="telephone=no,email=no,address=no">
<meta name="theme-color" content="#050505">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'none'; base-uri 'none'; form-action 'none'; frame-ancestors 'none';">
<title>永不失联 · 地址入口</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%}
body{min-height:100vh;background:#050505;color:#f5f5f5;font:16px/1.6 system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;display:flex;align-items:center;justify-content:center;padding:22px}
.wrap{width:min(520px,100%)}
.top{text-align:center;margin-bottom:20px}
.logo{font-size:30px;font-weight:900;letter-spacing:6px}
.sub{color:#aaa;font-size:13px;margin-top:6px}
.box{background:linear-gradient(180deg,#161616,#0d0d0d);border:1px solid #2b2b2b;border-radius:22px;padding:18px;box-shadow:0 20px 60px rgba(0,0,0,.45)}
.tip{font-size:13px;color:#cfcfcf;text-align:center;margin-bottom:14px}
.mail{display:block;text-align:center;text-decoration:none;color:#ffb020;background:#101010;border:1px dashed #3a3a3a;border-radius:14px;padding:12px;margin-bottom:14px;font-size:18px;font-weight:900;letter-spacing:1px}
.mail small{display:block;color:#999;font-size:12px;font-weight:500;letter-spacing:0;margin-top:2px}
.grid{display:grid;gap:10px}
.link{display:flex;align-items:center;justify-content:space-between;text-decoration:none;color:#fff;background:#111;border:1px solid #2a2a2a;border-radius:16px;padding:15px 16px;font-weight:800;letter-spacing:.5px;transition:.2s ease}
.link span{color:#ffb020;font-size:12px;font-weight:700}
.link:active{transform:scale(.985);background:#1a1a1a}
.foot{text-align:center;color:#777;font-size:12px;margin-top:16px}
@media (hover:hover){.link:hover{border-color:#ff9900;transform:translateY(-1px)}}
</style>
</head>
<body>
<main class="wrap">
  <div class="top">
    <div class="logo">永不失联</div>
    <p class="sub">请收藏本页，入口会自动跳转到可用地址</p>
  </div>
  <section class="box">
    <a class="mail" href="mailto:4@455555.XYZ" rel="nofollow">4@455555.XYZ<small>发邮件 30 秒内自动回复最新地址</small></a>
    <p class="tip">任选一个入口进入，系统会随机分配可用线路</p>
    <div class="grid">
      <a class="link" href="/r1.html" rel="nofollow">www.455333.xyz <span>进入</span></a>
      <a class="link" href="/r2.html" rel="nofollow">www.466333.xyz <span>进入</span></a>
      <a class="link" href="/r3.html" rel="nofollow">www.477333.xyz <span>进入</span></a>
      <a class="link" href="/r4.html" rel="nofollow">www.488333.xyz <span>进入</span></a>
    </div>
    <div class="foot">移动网络或内置浏览器可能拦截，建议复制到系统浏览器打开</div>
  </section>
</main>
</body>
</html>
