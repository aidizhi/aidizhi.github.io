<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

    <style>
        * {

            padding: 0;

        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", Helvetica, Arial, sans-serif;
            background: #ffffff;
            color: #000000;
            text-align: center;
            line-height: 1.6;
            min-height: 100vh;
        }

        a {
            text-decoration: none;
            color: #000000;
        }

        /* ===== Header ===== */
        .header-black {
            background: #000000;
            padding: 12px 20px;
        }

        .header-black h1 {
            color: #ffffff;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .header-orange {
            background: #ff9900;
            padding: 8px 20px;
        }

        .header-orange h2 {
            color: #000000;
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        /* ===== Content ===== */
        .content {
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }

        .tip {
            font-size: 14px;
            color: #333333;
            margin-bottom: 6px;
        }

        .tip-small {
            font-size: 12px;
            color: #666666;
            margin-bottom: 16px;
        }

        /* ===== Links ===== */
        .link-list {
            list-style: none;
            margin-bottom: 24px;
        }

        .link-list li {
            margin-bottom: 4px;
        }

        .link-list a {
            color: #ff9900;
            font-size: 16px;
            font-weight: 500;
            letter-spacing: 1px;
        }

        .link-list a:hover {
            text-decoration: underline;
        }

        /* ===== Number Links ===== */
        .number-links {
            margin-bottom: 24px;
        }

        .number-links a {
            display: inline-block;
            width: 32px;
            height: 32px;
            line-height: 30px;
            border: 1px solid #cccccc;
            border-radius: 50%;
            font-size: 14px;
            color: #ff9900;
            margin: 0 4px;
            transition: all 0.2s;
        }

        .number-links a:hover {
            background: #ff9900;
            color: #ffffff;
            border-color: #ff9900;
        }

        /* ===== Section Title ===== */
        .section-title {
            font-size: 16px;
            font-weight: 700;
            color: #000000;
            margin-bottom: 8px;
        }

        .section-title span {
            color: #ff0000;
        }

        /* ===== Bottom Tips ===== */
        .bottom-tips {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eeeeee;
        }

        .bottom-tips p {
            font-size: 13px;
            color: #333333;
            margin-bottom: 4px;
        }

        .bottom-tips a {
            color: #ff9900;
        }

        /* ===== Responsive ===== */
        @media (max-width: 480px) {
            .header-black h1 {
                font-size: 18px;
            }

            .header-orange h2 {
                font-size: 15px;
            }

            .link-list a {
                font-size: 14px;
            }

            .number-links a {
                width: 28px;
                height: 28px;
                line-height: 26px;
                font-size: 12px;
                margin: 0 2px;
            }
        }
    </style>
</head>

</html>
